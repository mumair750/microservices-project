apiVersion: apps/v1
kind: Deployment
metadata:
  name: categories-service
  namespace: microservices
  labels:
    app: categories-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: categories-service
  template:
    metadata:
      labels:
        app: categories-service
    spec:
      containers:
      - name: categories-service
        image: categories-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: POSTGRES_HOST
          value: "postgres-service"
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "password"
        - name: POSTGRES_DB
          value: "categories"
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: categories-service
  namespace: microservices
spec:
  selector:
    app: categories-service
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP
